services:
  - type: web
    name: vagas-bot-bots
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: AUTH_METHOD
        value: code
      - key: WHATSAPP_ENABLED
        value: false
      - key: DISCORD_ENABLED
        value: true
      - key: MOBILE_NUMBER
        sync: false
      - key: WHATSAPP_GROUP_ID
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false

  - type: cron
    name: vagas-bot-worker
    runtime: node
    plan: free
    schedule: "*/15 * * * *"
    buildCommand: npm install
    startCommand: npm run worker:once
    envVars:
      - key: NODE_ENV
        value: production
      - key: WEBHOOK_URL
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: JOB_SOURCES
        value: meupadrinho,remotar
      - key: MEUPADRINHO_MAX_PAGES
        value: "5"
      - key: REMOTAR_MAX_PAGES
        value: "5"
      - key: GUPY_MAX_PAGES_PER_KEYWORD
        value: "5"
      - key: WEBHOOK_MAX_JOBS_PER_RUN
        value: "100"
      - key: WEBHOOK_DELAY_MS
        value: "500"
      - key: NOTIFICATION_QUIET_HOURS_ENABLED
        value: "true"
      - key: NOTIFICATION_START_HOUR
        value: "6"
      - key: NOTIFICATION_END_HOUR
        value: "24"
      - key: NOTIFICATION_TIME_ZONE
        value: America/Sao_Paulo
