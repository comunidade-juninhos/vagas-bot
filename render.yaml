services:
  - type: web
    name: vagas-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npx concurrently -n "BOTS,SCRAPER" -c "blue,green" "npm run start" "npm run worker"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: AUTH_METHOD
        value: code
      - key: WHATSAPP_ENABLED
        value: false
      - key: DISCORD_ENABLED
        value: true
      - key: MOBILE_NUMBER
        sync: false
      - key: WHATSAPP_GROUP_ID
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      # Variáveis do Scraper que rodará junto com o Bot
      - key: WEBHOOK_URL
        value: http://localhost:3000/webhooks/jobs
      - key: JOB_SOURCES
        value: meupadrinho,remotar
      - key: MEUPADRINHO_MAX_PAGES
        value: "10"
      - key: REMOTAR_MAX_PAGES
        value: "10"
      - key: GUPY_MAX_PAGES_PER_KEYWORD
        value: "3"
      - key: WEBHOOK_MAX_JOBS_PER_RUN
        value: "100"
      - key: WEBHOOK_DELAY_MS
        value: "500"
      - key: NOTIFICATION_QUIET_HOURS_ENABLED
        value: "true"
      - key: NOTIFICATION_START_HOUR
        value: "6"
      - key: NOTIFICATION_END_HOUR
        value: "24"
      - key: NOTIFICATION_TIME_ZONE
        value: America/Sao_Paulo
